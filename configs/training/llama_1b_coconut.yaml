model:
  # COCONUT starts from the CoT checkpoint
  name_or_path: "checkpoints/llama_1b_cot"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

coconut:
  # Number of curriculum stages (each stage replaces one more reasoning step with latent tokens)
  num_stages: 3
  # Number of epochs per curriculum stage
  epochs_per_stage: 1
  # <bot>/<eot> token strings to use as latent thought delimiters
  bot_token: "<bot>"
  eot_token: "<eot>"

training:
  # COCONUT reads same CoT-formatted data as train_cot
  dataset_dir: "data/processed/beavertails_risk_v1/cot"
  output_dir: "checkpoints/llama_1b_coconut"
  per_device_train_batch_size: 4  #originally bumped to 16 but reduced due to OOM
  per_device_eval_batch_size: 4  #originally bumped to 16 but reduced due to OOM
  gradient_accumulation_steps: 16  #originally bumped to 16 but reduced due to OOM
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_seq_length: 512
  logging_steps: 50
  eval_strategy: "epoch"
  save_strategy: "epoch"
  fp16: false
  bf16: true
  seed: 42
