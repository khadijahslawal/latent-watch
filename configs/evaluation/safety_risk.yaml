evaluation:
  dataset_dir: "data/processed/beavertails_risk_v1"
  batch_size: 32
  max_new_tokens: 256
  # Labels expected in model output
  label_tokens:
    high_risk: "HIGH_RISK"
    low_risk: "LOW_RISK"

metrics:
  primary: ["accuracy", "f1_macro", "auroc"]
  per_category: true
  confusion_matrix: true

output:
  report_dir: "reports"
